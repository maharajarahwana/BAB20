  <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bab20</title>

<style>

*{
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#f4f4f4;
  margin:0;
  padding:15px;
}

.card{
  background:white;
  width:100%;
  max-width:500px;
  margin:auto;
  padding:25px 20px;
  text-align:center;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

#question{
  font-size:42px;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:12px;
  font-size:16px;
  margin-top:10px;
  border:2px solid orange;
  border-radius:6px;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  font-size:16px;
  margin-top:15px;
  cursor:pointer;
  background:#007BFF;
  color:white;
  border:none;
  border-radius:6px;
}

.result{
  font-size:20px;
  font-weight:bold;
}

.correct{
  color:green;
}

.wrong{
  color:red;
}

/* Perbaikan agar nomor tidak terpotong */

ol{
  text-align:left;
  max-height:65vh;
  overflow-y:auto;
  padding-left:30px;
  margin:0;
}

li{
  margin-bottom:8px;
  line-height:1.4;
}

</style>
</head>

<body>

<div class="card">

<h2 id="question"></h2>

<input type="text" id="answerInput" placeholder="Tulis jawaban di sini">

<button id="nextBtn">Selanjutnya</button>

</div>

<script>

let questions = [

{ soal: "인터넷", jawaban: "internet" },
{ soal: "아이디", jawaban: "id" },
{ soal: "내려받다", jawaban: "download" },
{ soal: "중식", jawaban: "makanan cina / makan siang" },
{ soal: "웹사이트", jawaban: "website" },
{ soal: "비밀 번호", jawaban: "password" },
{ soal: "다운로드 하다", jawaban: "download" },
{ soal: "로그인", jawaban: "login" },
{ soal: "홈페이지", jawaban: "home page" },
{ soal: "로그아웃", jawaban: "log out" },
{ soal: "저장하다", jawaban: "menyimpan" },
{ soal: "인터넷 카페", jawaban: "internet caffe" },
{ soal: "블로그", jawaban: "blog" },
{ soal: "스마트폰", jawaban: "smart phone" },
{ soal: "간편하다", jawaban: "mudah" },
{ soal: "애플리케이션", jawaban: "app / aplikasi" },
{ soal: "이메일", jawaban: "email" },
{ soal: "양식", jawaban: "formulir" },
{ soal: "시키다", jawaban: "menyuruh, memesan makanan" },
{ soal: "분식", jawaban: "cemilan" },
{ soal: "검색", jawaban: "browsing" },
{ soal: "평점", jawaban: "peringkat" },
{ soal: "더욱", jawaban: "lagi / bahkan lebih" },
{ soal: "참고 하여", jawaban: "untuk referensi" },
{ soal: "채팅", jawaban: "chating" },
{ soal: "게다가", jawaban: "lebih lagi" },
{ soal: "손쉽게", jawaban: "secara mudah" },
{ soal: "에스엔에스", jawaban: "social networking" },
{ soal: "화상 채팅", jawaban: "vc / video chating" },
{ soal: "모바일 메시지", jawaban: "sms" },
{ soal: "얻다", jawaban: "mendapatkan" },
{ soal: "이모티콘", jawaban: "emoticon" },
{ soal: "회원 가입", jawaban: "daftar member" },
{ soal: "와이 파이", jawaban: "wifi" },
{ soal: "사용자", jawaban: "pengguna" },
{ soal: "메시지를 보내다", jawaban: "mengirim pesan" },
{ soal: "회원 탈퇴", jawaban: "keluar member" },
{ soal: "메시지를 확인하다", jawaban: "mengecek pesan" },
{ soal: "한식", jawaban: "makanan korea" },
{ soal: "댓글을 달다", jawaban: "mengomentari" },
{ soal: "올리다", jawaban: "upload" },
{ soal: "업로드", jawaban: "upload" },

];

questions = questions.sort(()=>Math.random()-0.5);

let index = 0;
let score = 0;
let userAnswers = [];

const questionEl = document.getElementById("question");
const answerInput = document.getElementById("answerInput");
const nextBtn = document.getElementById("nextBtn");
const card = document.querySelector(".card");

function showQuestion(){
  questionEl.textContent = questions[index].soal;
  answerInput.value="";
  answerInput.focus();
}

nextBtn.addEventListener("click",()=>{

  const userAnswer = answerInput.value.trim().toLowerCase();

  userAnswers[index] = userAnswer;

  if(userAnswer === questions[index].jawaban){
    score++;
  }

  index++;

  if(index < questions.length){
    showQuestion();
  }else{
    showResult();
  }

});

function showResult(){

  let answerList="";

  questions.forEach((q,i)=>{

    if(userAnswers[i] === q.jawaban){
      answerList += `<li>${q.soal} = <span class="correct">${q.jawaban}</span></li>`;
    }else{
      answerList += `<li>${q.soal} = <span class="correct">${q.jawaban}</span><br>
      Jawaban kamu: <span class="wrong">${userAnswers[i] || "(kosong)"}</span></li>`;
    }

  });

  card.innerHTML = `
  <hr>
  <p>Kunci Jawaban:</p>
  <ol>${answerList}</ol>
  `;

}

showQuestion();

</script>

</body>
</html>
